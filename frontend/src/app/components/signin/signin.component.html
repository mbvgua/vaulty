<div class="container-fluid px-1 py-2 mx-auto">
  <div class="row d-flex justify-content-center">
    <div class="col-xl-7 col-lg-8 col-md-9 col-11 text-center">
      <h3>Signin to Vaulty!</h3>
      <p class="text-primary fs-5">
        Let’s get you back to your flock.<br />
        Everything you need is right where you left it
      </p>
      <div class="card">
        <form class="form-card">
          <div class="row justify-content-center text-left py-2">
            <div class="form-group col-sm-7 flex-column d-flex">
              <label>Username<span class="text-danger"> *</span></label>
              <input
                class="form-control form-control-lg"
                type="text"
                placeholder="Enter username"
              />
              <!--<div id="passwordHelpBlock" class="form-text text-danger">-->
              <!--  Your password must be 8-20 characters long, contain letters and-->
              <!--  numbers, and must not contain spaces, special characters, or-->
              <!--  emoji.-->
              <!--</div>-->
            </div>
          </div>
          <div class="row justify-content-center text-left py-2">
            <div class="col-sm-7 flex-column d-flex">
              <label>Password<span class="text-danger"> *</span></label>
              <input
                class="form-control form-control-lg"
                type="password"
                placeholder="••••••••"
              />

              <!--<div id="passwordHelpBlock" class="form-text text-danger">-->
              <!--  Your password must be 8-20 characters long, contain letters and-->
              <!--  numbers, and must not contain spaces, special characters, or-->
              <!--  emoji.-->
              <!--</div>-->
            </div>
          </div>
          <!-- button -->
          <div class="row justify-content-center mt-4">
            <div class="col-sm-6 d-grid">
              <!--[disabled]="signupForm.invalid"-->
              <button class="btn btn-primary btn-lg text-capitalize">
                signin
              </button>
            </div>
          </div>
          <!-- button end -->
        </form>

        <p class="justify-content-center text-capitalize pt-4">
          don't have an account?
          <a routerLink="/auth/login/admin" class="fw-bolder"> signup </a>
          instead
        </p>
      </div>
    </div>
  </div>
</div>
