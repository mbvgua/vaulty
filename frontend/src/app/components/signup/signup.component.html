<div class="container-fluid px-1 py-2 mx-auto">
  <div class="row d-flex justify-content-center">
    <div class="col-xl-7 col-lg-8 col-md-9 col-11 text-center">
      <h3>Signup for Vaulty!</h3>
      <p class="text-primary fs-5">
        Start managing your birds the smart way.<br />
        It only takes a minute to get set up
      </p>
      <div class="card">
        <form class="form-card">
          <div class="row justify-content-between text-left py-2">
            <div class="form-group col-sm-6 flex-column d-flex">
              <label>First name<span class="text-danger"> *</span></label>
              <input
                class="form-control form-control-lg"
                type="text"
                placeholder="Enter your first name"
              />

              <!--<div id="passwordHelpBlock" class="form-text text-danger">-->
              <!--  Your password must be 8-20 characters long, contain letters and-->
              <!--  numbers, and must not contain spaces, special characters, or-->
              <!--  emoji.-->
              <!--</div>-->
            </div>
            <div class="form-group col-sm-6 flex-column d-flex">
              <label>Last name<span class="text-danger"> *</span></label>
              <input
                class="form-control form-control-lg"
                type="text"
                placeholder="Enter your last name"
              />

              <!--  <div id="passwordHelpBlock" class="form-text text-danger">-->
              <!--    Your password must be 8-20 characters long, contain letters and-->
              <!--    numbers, and must not contain spaces, special characters, or-->
              <!--    emoji.-->
              <!--  </div>-->
            </div>
          </div>
          <div class="row justify-content-between text-left py-2">
            <div class="form-group col-sm-6 flex-column d-flex">
              <label>Username<span class="text-danger"> *</span></label>
              <input
                class="form-control form-control-lg"
                type="text"
                placeholder="Enter username"
              />

              <!--<div id="passwordHelpBlock" class="form-text text-danger">-->
              <!--  Your password must be 8-20 characters long, contain letters and-->
              <!--  numbers, and must not contain spaces, special characters, or-->
              <!--  emoji.-->
              <!--</div>-->
            </div>
            <div class="form-group col-sm-6 flex-column d-flex">
              <label>Email<span class="text-danger"> *</span></label>
              <input
                class="form-control form-control-lg"
                type="text"
                placeholder="example@gmail.com"
              />

              <!--<div id="passwordHelpBlock" class="form-text text-danger">-->
              <!--  Your password must be 8-20 characters long, contain letters and-->
              <!--  numbers, and must not contain spaces, special characters, or-->
              <!--  emoji.-->
              <!--</div>-->
            </div>
          </div>
          <div class="row justify-content-between text-left py-2">
            <div class="form-group col-sm-6 flex-column d-flex">
              <label>Password<span class="text-danger"> *</span></label>
              <input
                class="form-control form-control-lg"
                type="password"
                placeholder="••••••••"
              />

              <!--<div id="passwordHelpBlock" class="form-text text-danger">-->
              <!--  Your password must be 8-20 characters long, contain letters and-->
              <!--  numbers, and must not contain spaces, special characters, or-->
              <!--  emoji.-->
              <!--</div>-->
            </div>
            <div class="form-group col-sm-6 flex-column d-flex">
              <label>Confirm Password<span class="text-danger"> *</span></label>
              <input
                class="form-control form-control-lg"
                type="password"
                placeholder="••••••••"
              />

              <!--<div id="passwordHelpBlock" class="form-text text-danger">-->
              <!--  Your password must be 8-20 characters long, contain letters and-->
              <!--  numbers, and must not contain spaces, special characters, or-->
              <!--  emoji.-->
              <!--</div>-->
            </div>
          </div>
          <!-- button -->
          <div class="row justify-content-center mt-4">
            <div class="col-sm-6 d-grid">
              <!--[disabled]="signupForm.invalid"-->
              <button class="btn btn-primary btn-lg text-capitalize">
                signin
              </button>
            </div>
          </div>
          <!-- button end -->
        </form>

        <p class="justify-content-center  text-capitalize pt-4">
          already have an account?
          <a routerLink="/auth/login/admin" class="fw-bolder"> login </a>
          instead
        </p>
      </div>
    </div>
  </div>
</div>
